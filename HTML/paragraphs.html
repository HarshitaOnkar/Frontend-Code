<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!--Case 1-->
    <p>Hello</p>
    <p>Hi</p>
    <!--Case 2-->
    <p>Hello</p><p>Hi</p>
    <!--Case 3-->
    <p>Hello Hi</p>
    <!--Case 4-->
    <p>Hello
        Hi
    </p>
    <!--Case 5-->
    <!-- <br> break tag displays content in new line-->
     <p>Hello <br> Hi</p>
     <!--Case 6-->
     <p>Hello<br>
                             Hi
     </p>
    <!--Case 7-->
     <p>Hello<br>
                             H i
     </p>
    <!--Case 8-->
     <p>Hello<br>
                             H    i
     </p>
    <!--Case 9-->
     <pre>Hello<br>
                             H    i
     </pre>
</body>
</html>
